<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>figify-mcp</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #333333;
        --text-muted: #666666;
        --surface: #f5f5f5;
        --log-bg: #1e1e1e;
        --log-text: #d4d4d4;
        --btn-bg: #18a0fb;
        --btn-bg-hover: #0d8de8;
        --btn-disabled: #cccccc;
        --dot-disconnected: #ff4444;
        --dot-connected: #22cc44;
        --dot-connecting: #ffaa00;
        --log-error: #ff6b6b;
        --log-success: #69db7c;
        --log-info: #74c0fc;
        --toggle-bg: #e0e0e0;
        --toggle-icon: #555555;
      }

      [data-theme="dark"] {
        --bg: #1e1e2e;
        --text: #cdd6f4;
        --text-muted: #a6adc8;
        --surface: #313244;
        --log-bg: #11111b;
        --log-text: #cdd6f4;
        --btn-bg: #89b4fa;
        --btn-bg-hover: #74c0fc;
        --btn-disabled: #45475a;
        --toggle-bg: #45475a;
        --toggle-icon: #cdd6f4;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        padding: 16px;
        background: var(--bg);
        color: var(--text);
        transition: background 0.2s, color 0.2s;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 6px;
        background: var(--toggle-bg);
        color: var(--toggle-icon);
        cursor: pointer;
        font-size: 14px;
        padding: 0;
        flex-shrink: 0;
        transition: background 0.2s, color 0.2s;
      }

      .theme-toggle:hover {
        background: var(--surface);
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 6px;
        background: var(--surface);
        transition: background 0.2s;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--dot-disconnected);
      }

      .status-dot.connected {
        background: var(--dot-connected);
      }

      .status-dot.connecting {
        background: var(--dot-connecting);
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .log {
        background: var(--log-bg);
        color: var(--log-text);
        padding: 12px;
        border-radius: 6px;
        font-family: "SF Mono", Monaco, Consolas, monospace;
        font-size: 11px;
        height: 200px;
        overflow-y: auto;
        transition: background 0.2s, color 0.2s;
      }

      .log-entry {
        margin-bottom: 4px;
        word-break: break-all;
      }

      .log-entry.error {
        color: var(--log-error);
      }

      .log-entry.success {
        color: var(--log-success);
      }

      .log-entry.info {
        color: var(--log-info);
      }

      button#connectBtn {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        background: var(--btn-bg);
        color: white;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }

      button#connectBtn:hover {
        background: var(--btn-bg-hover);
      }

      button#connectBtn:disabled {
        background: var(--btn-disabled);
        cursor: not-allowed;
      }

      h1 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      p {
        color: var(--text-muted);
        line-height: 1.4;
        transition: color 0.2s;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div>
          <h1>figify-mcp</h1>
          <p>Connects to the MCP server to receive page screenshots</p>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" onclick="toggleTheme()">☀</button>
      </div>

      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
      </div>

      <button id="connectBtn" onclick="toggleConnection()">Connect</button>

      <div class="log" id="log"></div>
    </div>

    <script>
      const WEBSOCKET_URL = "ws://localhost:19407";
      let ws = null;
      let isConnected = false;
      let reconnectAttempts = 0;
      const MAX_RECONNECT_ATTEMPTS = 5;
      const RECONNECT_DELAY = 2000;

      function log(message, type = "info") {
        const logEl = document.getElementById("log");
        const entry = document.createElement("div");
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function updateStatus(status) {
        const dot = document.getElementById("statusDot");
        const text = document.getElementById("statusText");
        const btn = document.getElementById("connectBtn");

        dot.className = "status-dot";

        switch (status) {
          case "connected":
            dot.classList.add("connected");
            text.textContent = "Connected";
            btn.textContent = "Disconnect";
            isConnected = true;
            break;
          case "connecting":
            dot.classList.add("connecting");
            text.textContent = "Connecting...";
            btn.disabled = true;
            break;
          case "disconnected":
          default:
            text.textContent = "Disconnected";
            btn.textContent = "Connect";
            btn.disabled = false;
            isConnected = false;
            break;
        }
      }

      function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          return;
        }

        updateStatus("connecting");
        log("Connecting to MCP server...");

        try {
          ws = new WebSocket(WEBSOCKET_URL);

          ws.onopen = () => {
            updateStatus("connected");
            log("Connected to MCP server", "success");
            reconnectAttempts = 0;

            // Send initial ping
            ws.send(JSON.stringify({ id: "ping_0", type: "PING", payload: {} }));
          };

          ws.onmessage = (event) => {
            try {
              const message = JSON.parse(event.data);
              handleMessage(message);
            } catch (error) {
              log(`Failed to parse message: ${error.message}`, "error");
            }
          };

          ws.onclose = () => {
            updateStatus("disconnected");
            log("Disconnected from MCP server");
            ws = null;

            // Auto-reconnect if we were previously connected
            if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
              reconnectAttempts++;
              log(`Reconnecting in ${RECONNECT_DELAY / 1000}s (attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})...`);
              setTimeout(connect, RECONNECT_DELAY);
            }
          };

          ws.onerror = (error) => {
            log("WebSocket error - is the MCP server running?", "error");
          };
        } catch (error) {
          log(`Connection failed: ${error.message}`, "error");
          updateStatus("disconnected");
        }
      }

      function disconnect() {
        reconnectAttempts = MAX_RECONNECT_ATTEMPTS; // Prevent auto-reconnect
        if (ws) {
          ws.close();
          ws = null;
        }
        updateStatus("disconnected");
        log("Disconnected");
      }

      function toggleConnection() {
        if (isConnected) {
          disconnect();
        } else {
          reconnectAttempts = 0;
          connect();
        }
      }

      function handleMessage(message) {
        log(`Received: ${message.type}`, "info");

        switch (message.type) {
          case "CREATE_FRAME":
            handleCreateFrame(message);
            break;
          case "CREATE_LAYERS":
            handleCreateLayers(message);
            break;
          case "PONG":
            log("Ping successful", "success");
            break;
          default:
            log(`Unknown message type: ${message.type}`);
        }
      }

      function handleCreateFrame(message) {
        const { id, payload } = message;
        const { name, screenshots } = payload;

        log(`Creating frame: ${name} with ${screenshots.length} screenshot(s)`, "info");

        // Send to Figma plugin code
        parent.postMessage(
          {
            pluginMessage: {
              type: "CREATE_FRAME",
              id,
              name,
              screenshots,
            },
          },
          "*"
        );
      }

      function handleCreateLayers(message) {
        const { id, payload } = message;
        const { name, layers } = payload;

        log(`Creating layers: ${name} with ${layers.length} viewport(s)`, "info");

        // Send to Figma plugin code
        parent.postMessage(
          {
            pluginMessage: {
              type: "CREATE_LAYERS",
              id,
              name,
              layers,
            },
          },
          "*"
        );
      }

      // Receive messages from Figma plugin code
      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "FRAME_CREATED") {
          log(`Frame created: ${msg.frameId}`, "success");

          // Send response back to MCP server
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(
              JSON.stringify({
                id: msg.id,
                type: "FRAME_CREATED",
                payload: {
                  frameId: msg.frameId,
                  success: true,
                },
              })
            );
          }
        } else if (msg.type === "LAYERS_CREATED") {
          log(`Layers created: ${msg.frameId} (${msg.layersCreated} layers)`, "success");

          // Send response back to MCP server
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(
              JSON.stringify({
                id: msg.id,
                type: "LAYERS_CREATED",
                payload: {
                  frameId: msg.frameId,
                  success: true,
                  layersCreated: msg.layersCreated,
                },
              })
            );
          }
        } else if (msg.type === "ERROR") {
          log(`Error: ${msg.error}`, "error");

          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(
              JSON.stringify({
                id: msg.id,
                type: "ERROR",
                payload: {
                  error: msg.error,
                },
              })
            );
          }
        }
      };

      // --- Dark mode ---
      function applyTheme(dark) {
        document.body.setAttribute("data-theme", dark ? "dark" : "light");
        document.getElementById("themeToggle").textContent = dark ? "🌙" : "☀";
      }

      function toggleTheme() {
        const isDark = document.body.getAttribute("data-theme") === "dark";
        const next = !isDark;
        applyTheme(next);
        try {
          localStorage.setItem("figify-theme", next ? "dark" : "light");
        } catch (_) {}
      }

      // Initialise theme: stored preference → OS preference → light
      (function initTheme() {
        let stored = null;
        try { stored = localStorage.getItem("figify-theme"); } catch (_) {}
        if (stored === "dark" || stored === "light") {
          applyTheme(stored === "dark");
        } else {
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          applyTheme(prefersDark);
        }
      })();

      // Auto-connect on load
      setTimeout(connect, 500);
    </script>
  </body>
</html>
